<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Profile card component</title>
</head>

<body>
  <div class="container">

    <div class="upper">
      <img src="./images/bg-pattern-card.svg" alt="">
    </div>

    <div class="image">
      <img src="./images/image-victor.jpg" >
    </div>

    <div class="lower">

      <div class="up-text">
        <h3>Victor Crest <span>26</span></h3>
        <p>London</p>
      </div>

      <div class="low-text">

        <div class="numbers">
          <h3>80K</h3>
          <h3>803K</h3>
          <h3>1.4K</h3>
        </div>

        <div class="text">
          <p>Followers</p>
          <p>Likes</p>
          <p>Photos</p>
        </div>

      </div>

    </div>

  </div>





  <!-- Victor Crest
  26
  London

  80K
  Followers

  803K
  Likes

  1.4K
  Photos -->
</body>

</html>
